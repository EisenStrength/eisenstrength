body {
  background-color: #292929 !important;
  background: radial-gradient(ellipse at center, #2f2f2f 0%, #292929 50%, #222222 100%) !important;
  color: #e6e5da !important;
}

.es-page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 3rem 1.5rem 2.5rem;
  background: radial-gradient(ellipse at center, #2f2f2f 0%, #292929 50%, #222222 100%);
}

/* Logo */
.es-logo {
  width: 100%;
  max-width: 380px;
  margin-bottom: 2rem;
}
.es-logo img { width: 100%; height: auto; display: block; }

/* Heading */
.es-heading {
  font-size: clamp(2rem, 10vw, 4.5rem);
  font-weight: 200;
  color: #e6e5da;
  letter-spacing: -0.02em;
  margin-bottom: 2.5rem;
  text-align: center;
}

/* Form */
.es-form {
  width: 100%;
  max-width: 440px;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.es-form input {
  width: 100% !important;
  padding: 0.9rem 1.2rem !important;
  background: transparent !important;
  border: 2px solid #c6baaa !important;
  border-radius: 8px !important;
  color: #e6e5da !important;
  font-size: 1rem !important;
  font-family: inherit !important;
  outline: none !important;
  box-shadow: none !important;
  -webkit-appearance: none !important;
  transition: border-color 0.3s;
}
.es-form input::placeholder { color: #c6baaa; opacity: 0.5; }
.es-form input:focus { border-color: #263c29 !important; }

.es-btn {
  width: 100% !important;
  padding: 0.9rem 1.2rem !important;
  background: #263c29 !important;
  border: none !important;
  border-radius: 8px !important;
  color: #e6e5da !important;
  font-size: 1rem !important;
  font-weight: 500 !important;
  font-family: inherit !important;
  cursor: pointer !important;
  -webkit-appearance: none !important;
  margin-top: 0.5rem;
  transition: opacity 0.3s;
}
.es-btn:hover:not(:disabled) { opacity: 0.85; }
.es-btn:disabled { opacity: 0.6; cursor: default; }

/* Messages — hidden by default, shown by JS only */
.es-msg {
  display: none !important;
  text-align: center;
  font-size: 0.85rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.5rem 0;
  margin-top: 0.5rem;
}
.es-msg-ok  { color: #4a7a50 !important; }
.es-msg-err { color: #c06060 !important; }

/* Instagram */
.es-social {
  margin-top: 2rem;
}
.es-social a {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  text-decoration: none;
  color: #c6baaa;
  font-size: 0.8rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  opacity: 0.6;
  transition: opacity 0.2s, color 0.2s;
}
.es-social a:hover { opacity: 1; color: #e6e5da; }
.es-social svg { width: 16px; height: 16px; fill: currentColor; flex-shrink: 0; }

/* Fade-in on load */
@keyframes esFade {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
.es-logo    { animation: esFade 0.6s ease both 0.1s; }
.es-heading { animation: esFade 0.6s ease both 0.25s; }
.es-form    { animation: esFade 0.6s ease both 0.4s; }
.es-social  { animation: esFade 0.6s ease both 0.6s; }

@media (max-width: 480px) {
  .es-page { padding: 2rem 1.25rem; }
  .es-logo { max-width: 260px; }
}
